<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Page Not Found | CapelaMed</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body style="background:var(--light-gray);">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;">
<div>
<div style="font-size:120px;font-weight:700;color:var(--primary-teal);line-height:1;">404</div>
<h1 style="font-size:32px;margin:16px 0;color:var(--dark-gray);">Page Not Found</h1>
<p style="color:var(--med-gray);margin-bottom:24px;">The page you are looking for does not exist or has been moved.</p>
<a href="/" class="cta-btn">Go Home</a>
</div>
</div>


<!-- Referral Modal -->
<div id="referralModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;padding:32px;border-radius:16px;max-width:420px;width:90%;box-shadow:0 12px 40px rgba(0,0,0,0.2);position:relative;">
    <h3 style="margin-bottom:16px;color:#0A5C5C;">Are you referred by an agent?</h3>
    <div id="referralChoice" style="display:flex;gap:12px;margin-bottom:20px;">
      <button id="refNo" style="flex:1;padding:12px;background:#0A2540;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;">No, continue</button>
      <button id="refYes" style="flex:1;padding:12px;background:#D4A853;color:#0A2540;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Yes, I was referred</button>
    </div>
    <form id="refForm" style="display:none;">
      <input id="refName" type="text" placeholder="Full Name" required style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ccc;border-radius:6px;">
      <input id="refEmail" type="email" placeholder="Email Address" required style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ccc;border-radius:6px;">
      <input id="refPhone" type="tel" placeholder="Phone Number" required style="width:100%;padding:10px;margin-bottom:16px;border:1px solid #ccc;border-radius:6px;">
      <button type="submit" style="width:100%;padding:12px;background:#0A5C5C;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Submit & Continue</button>
    </form>
    <p id="refStatus" style="margin-top:12px;font-size:13px;color:#666;text-align:center;"></p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const modal = document.getElementById('referralModal');
  const choiceDiv = document.getElementById('referralChoice');
  const form = document.getElementById('refForm');
  const status = document.getElementById('refStatus');
  let targetUrl = '';

  document.querySelectorAll('a[href*="planenroll.com"]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      targetUrl = btn.href;
      modal.style.display = 'flex';
      choiceDiv.style.display = 'flex';
      form.style.display = 'none';
      status.textContent = '';
    });
  });

  document.getElementById('refNo').onclick = () => { window.location.href = targetUrl; };
  document.getElementById('refYes').onclick = () => {
    choiceDiv.style.display = 'none';
    form.style.display = 'block';
  };

  form.addEventListener('submit', async e => {
    e.preventDefault();
    status.textContent = 'Saving...';
    const payload = {
      name: document.getElementById('refName').value,
      email: document.getElementById('refEmail').value,
      phone: document.getElementById('refPhone').value,
      destination: targetUrl
    };
    try {
      const res = await fetch('/api/referral.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.success) {
        status.textContent = '✅ Saved! Redirecting...';
        setTimeout(() => window.location.href = targetUrl, 800);
      } else {
        status.textContent = '❌ Error saving data. Please try again.';
      }
    } catch {
      status.textContent = '❌ Network error. Redirecting anyway...';
      setTimeout(() => window.location.href = targetUrl, 1000);
    }
  });

  modal.addEventListener('click', e => { if (e.target === modal) modal.style.display = 'none'; });
});
</script>

</body>
</html>
